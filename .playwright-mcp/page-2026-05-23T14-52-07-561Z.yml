            - generic [ref=e71]:
              - generic [ref=e73]:
                - paragraph [ref=e74]: يمثل مستخدمو النظام الخوادم أو البرامج التي تقوم بإجراء استدعاءات واجهة API للأصول التي تديرها حافظة أعمال في Meta Business Suite.
                - paragraph [ref=e75]: "يوجد نوعان من مستخدمي النظام:"
                - list [ref=e76]:
                  - listitem [ref=e77]:
                    - generic [ref=e78]: "مستخدم النظام المسؤول: يمكن لمستخدم النظام المسؤول إنشاء حسابات لمستخدمي النظام وإضافة حسابات وتعيين أذونات وغير ذلك الكثير."
                  - listitem [ref=e79]:
                    - generic [ref=e80]: "مستخدم النظام العادي: يمكن لمستخدمي النظام الوصول فقط إلى الأصول التي حصلوا على أذونات لها."
                - paragraph [ref=e81]: قم بإنشاء حساب مستخدم نظام واحد لكل نوع من أنواع صلاحية الوصول التي تحتاج إليها. وامنح حسابات مستخدمي النظام صلاحية وصول إلى الأصول واستخدمها لمعظم استدعاءات واجهة API.
                - paragraph [ref=e82]: استخدِم "مستخدم النظام المسؤول" للاحتفاظ بالأدوار الصحيحة برمجيًا. وبهذه الطريقة، إذا تعرض رمز مستخدم النظام للاختراق، فإن نطاقه يكون محدودًا ولا يمكن اختراق المزيد من الأذونات.
                - paragraph [ref=e83]: يتعين تقييد استخدام "مستخدم النظام المسؤول" وقصره على الإجراءات الإدارية، مثل تعيين الأذونات. ونظرًا لتمتعه بأكبر قدر من الأذونات، يجب الحرص على حماية رمز وصول مستخدم النظام المسؤول.
