<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_name }} - Login</title>
  {% if lang == 'ar' %}
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  {% endif %}
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/app.js"></script>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">🤖</div>
      <h1>{{ app_name }}</h1>
      <p data-i18n="login.desc">{{ t('login.desc', lang) }}</p>
      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <div class="form-group">
          <input type="password" name="pin" class="form-input" placeholder="{{ t('login.pin', lang) }}" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">{{ t('login.submit', lang) }}</button>
      </form>
    </div>
  </div>
  <script>setLanguage('{{ lang }}');</script>
</body>
</html>
